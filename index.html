<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <!--FONT-->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!--ESTILOS-->
    <link rel="stylesheet" href="./style.css">
    <!--ICONOS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    
    <div id="homeScreen" class="homeScreen fixedPosition fullScreen">
        <div class="container">
            <h1>Flappy Nyan Cat</h1>
            <div class="characterSelector">
                <button class="changeBtn" id="prevCharater"><i class="fa-solid fa-angle-left"></i></button>
                <div id="imgContainer" class="imgCharacterConteiner">
                    <img id="character" src="./media/characters/Nyan-cat.webp" alt="">
                </div>
                <button class="changeBtn" id="nextCharater"><i class="fa-solid fa-angle-right"></i></button>
            </div>
            <button class="btn" id="start">START</button>
        </div>
    </div>
    <div id="menu" class="menu hidden fixedPosition fullScreen">
        <div class="container">
            <div class="opts">
                <button>setings</button>
                <button>character</button>
                <button>mode</button>
            </div>
            <h2 id="score"></h2>
            <p id="bestScore"></p>
            <button id="playAgain">PLAY AGAIN</button>
        </div>
    </div>
    <canvas id="gameBoard" width="800" height="600"></canvas>
</body>
<script src="./script.js"></script>
</html>
